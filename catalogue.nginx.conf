# ==============================================================================
# Standalone Nginx Configuration for Catalogue Management System
# ==============================================================================
# This configuration runs completely independently from your existing LMS Nginx setup.
# 
# To ensure zero impact on LMS:
# 1. This file is saved separately as 'catalogue.conf' in Nginx's sites-available.
# 2. It proxies to port 5001, which is the host port mapped in docker-compose.yml
# 3. If you make any changes to LMS, its configuration files remain completely 
#    unaffected, and our Catalogue configurations are preserved without interference.
# ==============================================================================

# Define our Express API/React Frontend server
upstream catalogue_backend {
    server 127.0.0.1:5001; # Pointing to the host port mapped in docker-compose.yml
    keepalive 32;
}

# HTTP server block: Handles certbot challenge and redirects everything else to HTTPS
server {
    listen 80;
    server_name catalogue.desukafashion.com; # <--- Replace with your staging/production subdomain

    # Path for Let's Encrypt / Certbot verification
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    # Redirect all other HTTP traffic to secure HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server block: Handles secure SSL communication
server {
    listen 443 ssl http2;
    server_name catalogue.desukafashion.com; # <--- Replace with your staging/production subdomain

    # SSL Certificates (managed automatically by Certbot)
    # Once you run certbot, these lines will be populated automatically.
    # To set up manually, uncomment and verify your paths:
    # ssl_certificate /etc/letsencrypt/live/catalogue.desukafashion.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/catalogue.desukafashion.com/privkey.pem;

    # Highly secure SSL profiles and parameters
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Enable security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

    # Support high-capacity photo/image uploads (e.g., up to 50MB per request)
    client_max_body_size 50M;

    # Reverse proxy settings to pass requests to our Docker container
    location / {
        proxy_pass http://catalogue_backend;
        
        # Enable HTTP/1.1 and WebSockets/Keep-Alive connections
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Client IP propagation headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts to handle slow networks and upload streams
        proxy_connect_timeout 60s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }
}
