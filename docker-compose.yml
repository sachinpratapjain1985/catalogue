version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: catalogue-db
    restart: always
    environment:
      POSTGRES_DB: catalogue_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: catalogue-backend
    restart: always
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres_password
      - DB_NAME=catalogue_db
      - JWT_SECRET=super_secret_key_change_me_in_prod
      - UPLOAD_DIR=/app/uploads
      - SSL_CERT_PATH=/etc/letsencrypt/live/lms.desukafashion.com/fullchain.pem
      - SSL_KEY_PATH=/etc/letsencrypt/live/lms.desukafashion.com/privkey.pem
    volumes:
      - uploads-data:/app/uploads
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - db

volumes:
  pgdata:
    driver: local
  uploads-data:
    driver: local
